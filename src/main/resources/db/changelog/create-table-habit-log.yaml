databaseChangeLog:
  - changeSet:
      id: 003-create-habit-log-table
      author: vlatal
      changes:
        - createTable:
            tableName: habit_log
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: habit_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: log_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: current_value
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: habit_log
            baseColumnNames: habit_id
            constraintName: FK_HabitLog_Habit
            referencedTableName: habit
            referencedColumnNames: id
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: habit_log
            columnNames: habit_id, log_date
            constraintName: UK_HabitLog_habit_logDate