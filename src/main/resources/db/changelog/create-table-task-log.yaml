databaseChangeLog:
  - changeSet:
      id: 005-create-task-log-table
      author: vlatal
      changes:
        - createTable:
            tableName: task_log
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: task_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: log_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: task_log
            baseColumnNames: task_id
            constraintName: FK_TaskLog_Task
            referencedTableName: task
            referencedColumnNames: id
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: task_log
            columnNames: task_id, log_date
            constraintName: UK_TaskLog_task_logDate
