databaseChangeLog:
  - changeSet:
      id: 006-add-minutes-earned-and-balance
      author: vlatal
      changes:
        - createTable:
            tableName: user_balance
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: balance
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addColumn:
            tableName: habit_log
            columns:
              - column:
                  name: minutes_earned
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
        - addColumn:
            tableName: task_log
            columns:
              - column:
                  name: minutes_earned
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
