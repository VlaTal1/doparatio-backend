# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/doparatio_db_dev?currentSchema=test_schema
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-init-sql=CREATE SCHEMA IF NOT EXISTS test_schema

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Liquibase
spring.liquibase.change-log=classpath:db/db.changelog-master.yaml
spring.liquibase.enabled=true
spring.liquibase.default-schema=test_schema

# Disable supabase properties during testing if they require connection
supabase.url=http://localhost
supabase.jwt.secret=testsecret
supabase.service.key=testkey
supabase.jwks.url=http://localhost
